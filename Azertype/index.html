<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azertype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header> 
        <h1>Azertype</h1>
        <h3>L'application pour ecrire plus vite !</h3>
        <p>Azertype est une application pour apprendre a taper plus vite au clavier :)</p>
    </header>

    <div class="card">
        <div class="textIndication"> Choisissez votre option et tapez la proposition qui s'affiche dans le champ en-dessous</div>
        
        <div class="choix">
            <input type="radio" id="mots" name="type" value="mots" checked>
            <label for="mots">Mots</label>
            <input type="radio" id="phrases" name="type" value="phrases">
            <label for="phrases">Phrases</label>
        </div>

        <div class="typeArea">
            <div class="proposition"> Cachalot</div>
            <div class="retour">
                <div class="tapingReceiver"></div>
                <button class="validation">Valider</button>
        </div>

        <p>Votre score : 0 / 0</p>
        <button>Partager</button>
    </div>

    <footer> @Copyright : Openclassrooms</footer>
</body>
</html>
